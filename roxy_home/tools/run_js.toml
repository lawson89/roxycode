description = """ Executes arbitrary JavaScript code in a sandbox.
This tool uses GraalJS to run the provided JavaScript code and returns the output and any console.log messages.
Please see the system message for details on the available globals
"""
type = "graaljs"
source = "file:run_js.js"

[[parameters]]
name = "script"
type = "string"
description = "The JavaScript code to run."
required = true
