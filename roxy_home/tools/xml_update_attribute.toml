description = "Updates an attribute of an element identified by XPath."
type = "graaljs"
source = "file:xml_update_attribute.js"

[[parameters]]
name = "path"
type = "string"
description = "The path to the XML file."
required = true

[[parameters]]
name = "xpath"
type = "string"
description = "The XPath identifying the element."
required = true

[[parameters]]
name = "name"
type = "string"
description = "The name of the attribute."
required = true

[[parameters]]
name = "value"
type = "string"
description = "The new value of the attribute."
required = true
