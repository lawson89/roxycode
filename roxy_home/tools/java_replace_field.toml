description = "Replaces the source code of a specific field in a Java class."
type = "graaljs"
source = "file:java_replace_field.js"

[[parameters]]
name = "path"
type = "string"
description = "The path to the Java file."
required = true

[[parameters]]
name = "className"
type = "string"
description = "The name of the class containing the field."
required = true

[[parameters]]
name = "fieldName"
type = "string"
description = "The name of the field."
required = true

[[parameters]]
name = "newFieldSource"
type = "string"
description = "The new source code for the field."
required = true
