description = "Gets the source code of a specific method in a Java class."
type = "graaljs"
source = "file:java_get_method_source.js"

[[parameters]]
name = "path"
type = "string"
description = "The path to the Java file."
required = true

[[parameters]]
name = "className"
type = "string"
description = "The name of the class containing the method."
required = true

[[parameters]]
name = "methodName"
type = "string"
description = "The name of the method."
required = true
