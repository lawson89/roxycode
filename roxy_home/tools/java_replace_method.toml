description = "Replaces the source code of a specific method in a Java class."
type = "graaljs"
source = "file:java_replace_method.js"

[[parameters]]
name = "path"
type = "string"
description = "The path to the Java file."
required = true

[[parameters]]
name = "className"
type = "string"
description = "The name of the class containing the method."
required = true

[[parameters]]
name = "methodName"
type = "string"
description = "The name of the method."
required = true

[[parameters]]
name = "newMethodSource"
type = "string"
description = "The new source code for the method."
required = true
