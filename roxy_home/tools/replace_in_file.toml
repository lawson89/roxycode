description = "Replaces text in a file using a regex pattern."
type = "graaljs"
source = "file:replace_in_file.js"

[[parameters]]
name = "path"
type = "string"
description = "The file path relative to project root."
required = true

[[parameters]]
name = "search"
type = "string"
description = "The regex pattern to search for."
required = true

[[parameters]]
name = "replace"
type = "string"
description = "The replacement text."
required = true