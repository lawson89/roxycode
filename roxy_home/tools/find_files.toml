description = "Finds files whose names match a a shell-style wildcard pattern."
type = "graaljs"
source = "file:find_files.js"

[[parameters]]
name = "pattern"
type = "string"
description = "The shell-style wildcard pattern to match filenames (e.g. '*.java')."
required = true

[[parameters]]
name = "path"
type = "string"
description = "Relative path to start search from. Defaults to project root."
required = true
