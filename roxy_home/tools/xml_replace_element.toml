description = "Replaces an element identified by XPath with new XML content."
type = "graaljs"
source = "file:xml_replace_element.js"

[[parameters]]
name = "path"
type = "string"
description = "The path to the XML file."
required = true

[[parameters]]
name = "xpath"
type = "string"
description = "The XPath identifying the element to replace."
required = true

[[parameters]]
name = "newXml"
type = "string"
description = "The new XML content."
required = true
