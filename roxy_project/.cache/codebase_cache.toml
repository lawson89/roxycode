path = "roxy_home/context/sierradsl.toml"
size = 3825
mimeType = "text/toml"
content = '''
description = "Documentation for the Sierra UI DSL Syntax, a declarative XML format for building Java Swing UIs."

context = """
# Sierra DSL Syntax Guide

Sierra is a lightweight, open-source framework for simplifying Java Swing development using a declarative XML syntax.

## Core Concepts
- **Root Element**: Can be any component, typically a container like `<column-panel>`, `<row-panel>`, or `<stack-panel>`.
- **DTD**: The `sierra.dtd` file defines the schema, but validation is optional.
- **Loading**: Use `UILoader.load(...)` to hydrate the XML into Swing components.

## Layout Containers
Sierra provides specific panels that replace complex Swing LayoutManagers:

### `<column-panel>`
Arranges children vertically.
- **Attributes**: `spacing` (gap between items), `padding`, `alignToGrid` (boolean).
- **Example**:
  ```xml
  <column-panel spacing="8" padding="16">
      <label text="Header" font="h1"/>
      <textfield placeholderText="Enter data"/>
  </column-panel>

```

### `<row-panel>`

Arranges children horizontally.

* **Attributes**: `spacing`, `padding`, `alignToBaseline` (boolean).
* **Example**:
```xml
<row-panel alignToBaseline="true">
    <label text="Name:"/>
    <textfield columns="20"/>
</row-panel>

```



### `<stack-panel>`

Sizes children to fill the available space (Z-order stacking).

* **Usage**: Useful for overlays or background images.

### `<spacer>`

Provides fixed or flexible space.

* **Attributes**: `size` (fixed dimension), `weight` (flexible "glue").
* **Example**: `<spacer weight="1"/>` acts like `Box.createGlue()`.

## Common Components

Standard Swing components are mapped to kebab-case tags:

* `<button text="..." onAction="..."/>`
* `<toggle-button icon="..." selected="true"/>`
* `<radio-button text="..." group="myGroup"/>`
* `<check-box text="..."/>`
* `<label text="..." horizontalAlignment="center"/>`
* `<text-field text="..." columns="10" placeholderText="..."/>`
* `<password-field .../>`
* `<text-area rows="5"/>`
* `<scroll-pane>` (Wraps a single child)
* `<tabbed-pane>` (Children use `tabTitle` and `tabIcon` attributes)

## Sierra-Specific Components

* `<text-pane>`: Alternative to JLabel for wrapping text.
* `<image-pane>`: displaying images with scaling (`scaleMode="fill-width"`).
* `<activity-indicator>`: Indeterminate progress spinner.

## Attributes & Styling

* **Identifiers**: `id` or `name` (Injects component into a Java field of the same name).
* **Colors**: `background="#ffffff"`, `foreground="blue"`, `border="silver"`.
* **Fonts**: `font="Arial-BOLD-18"`, `font="h1.font"` (FlatLaf named font).
* **Weights**: `weight="1.0"` (Allocates excess space in `Row`/`Column` panels).
* **FlatLaf Integration**: Use `style` or `styleClass` attributes (e.g., `styleClass="h2"`).

## Custom Components

To use a custom Java class that extends `JComponent`:

```xml
<component class="org.roxycode.ui.MarkdownPane" id="chatArea"/>

```

## Complete Example

```xml
<border-layout>
    <north>
        <row-panel padding="8" background="lightGray">
            <label text="Git Branch:" styleClass="h3"/>
            <label id="branchLabel" text="main" foreground="blue"/>
        </row-panel>
    </north>
    <center>
        <scroll-pane>
            <component class="org.roxycode.ui.MarkdownPane" id="chatOutput"/>
        </scroll-pane>
    </center>
    <south>
        <row-panel spacing="4" padding="4">
            <text-field id="inputField" weight="1"/>
            <button text="Send" defaultButton="true"/>
        </row-panel>
    </south>
</border-layout>

```

You have the sierra dtd and example files. Please ensure all sierra xml files you generate pass dtd validation and conform to the syntax described above.

"""

files = ["sierra.dtd", "BlockLayoutTest.java", "BlockLayoutTest.xml", "MenuTest.java", "MenuTest.xml"]
'''

